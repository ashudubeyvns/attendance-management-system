name: Build & Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'

    - name: Compile all source files
      run: javac -d build/classes src/attendancemgt/*.java src/login_frame.java

    - name: Build executable JAR
      run: jar cfm dist/AttendanceMgt.jar manifest.mf -C build/classes .

    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AttendanceMgt-JAR
        path: dist/AttendanceMgt.jar

